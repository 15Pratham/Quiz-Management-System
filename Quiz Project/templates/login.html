<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Enterprise Quiz System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

```
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

    body{
        font-family:'Poppins',sans-serif;
        min-height:100vh;

        background:
        radial-gradient(circle at 20% 30%, rgba(0,140,255,0.35), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(120,0,255,0.35), transparent 40%),
        linear-gradient(135deg,#0f172a,#1e293b,#020617);

        display:flex;
        align-items:center;
        justify-content:center;
    }

    /* Login Card */
    .login-card{
        width:420px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius:20px;
        border:1px solid rgba(255,255,255,0.15);
        box-shadow:0 25px 50px rgba(0,0,0,0.45);
        padding:40px;
        color:white;
    }

    .title{
        font-weight:700;
    }

    .subtitle{
        font-size:14px;
        color:#94A3B8;
    }

    /* Inputs */
    .form-control{
        background:#334155;
        border:none;
        border-radius:10px;
        padding:12px;
        color:white;
    }

    .form-control::placeholder{
        color:#cbd5f5;
    }

    .form-control:focus{
        background:#475569;
        box-shadow:0 0 0 2px #2563EB;
        color:white;
    }

    /* Button */
    .btn-primary-custom{
        background:linear-gradient(90deg,#3b82f6,#2563eb);
        border:none;
        border-radius:30px;
        padding:12px;
        font-weight:600;
        transition:all 0.3s ease;
    }

    .btn-primary-custom:hover{
        transform:scale(1.03);
        box-shadow:0 0 15px rgba(37,99,235,0.6);
    }

    /* Link */
    .link-style{
        color:#60A5FA;
        text-decoration:none;
        font-weight:500;
    }

    .link-style:hover{
        text-decoration:underline;
    }

</style>
```

</head>

<body>

<div class="login-card">

<div class="text-center mb-4">
    <h3 class="title">Welcome Back</h3>
    <p class="subtitle">Login to your account</p>
</div>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input 
            type="text" 
            class="form-control" 
            name="username" 
            placeholder="Enter username" 
            required>
    </div>

    <div class="mb-4">
        <label class="form-label">Password</label>
        <input 
            type="password" 
            class="form-control" 
            name="password" 
            placeholder="Enter password" 
            required>
    </div>

    <div class="d-grid">
        <button type="submit" class="btn btn-primary-custom text-white">
            Login
        </button>
    </div>

</form>

<div class="text-center mt-4">
    <small>
        Don't have an account?
        <a href="{% url 'register' %}" class="link-style">Register</a>
    </small>
</div>

</div>

</body>
</html>
