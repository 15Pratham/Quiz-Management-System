<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0F172A; color:white;">

<div class="container mt-5">

    <h2 class="mb-4">Professional Analytics</h2>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="p-4 bg-dark rounded text-center">
                <h5>Total Quizzes</h5>
                <h3>{{ total_quizzes }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="p-4 bg-dark rounded text-center">
                <h5>Total Attempts</h5>
                <h3>{{ total_attempts }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="p-4 bg-dark rounded text-center">
                <h5>Average Score</h5>
                <h3>{{ avg_score }}%</h3>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-md-6 text-center">
            <div class="bg-dark p-3 rounded">
                <h5>Quiz Performance</h5>
                <img src="/media/analytics_bar.png" class="img-fluid mt-3">
            </div>
        </div>

        <div class="col-md-6 text-center">
            <div class="bg-dark p-3 rounded">
                <h5>Pass vs Fail</h5>
                <img src="/media/analytics_pie.png" class="img-fluid mt-3">
            </div>
        </div>

    </div>

</div>

</body>
</html>
