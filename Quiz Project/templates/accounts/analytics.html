<!DOCTYPE html>
<html>
<head>
    <title>Analytics - Enterprise Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #0F172A;
    color: white;
}
.card-dark {
    background: #1E293B;
    padding: 25px;
    border-radius: 12px;
}
.stat-number {
    font-size: 30px;
    font-weight: bold;
    color: #60A5FA;
}
img {
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Professional Analytics Dashboard</h2>

    <div class="row g-4 mb-5">

        <div class="col-md-4">
            <div class="card-dark text-center">
                <p>Total Quizzes</p>
                <div class="stat-number">{{ total_quizzes }}</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-dark text-center">
                <p>Total Attempts</p>
                <div class="stat-number">{{ total_attempts }}</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-dark text-center">
                <p>Average Score</p>
                <div class="stat-number">{{ average_score }}%</div>
            </div>
        </div>

    </div>

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card-dark text-center">
                <h5>Quiz Performance</h5>
                <img src="/media/bar_chart.png" class="img-fluid mt-3">
            </div>
        </div>

        <div class="col-md-6">
            <div class="card-dark text-center">
                <h5>Pass vs Fail</h5>
                <img src="/media/pie_chart.png" class="img-fluid mt-3">
            </div>
        </div>

    </div>

</div>

</body>
</html>
